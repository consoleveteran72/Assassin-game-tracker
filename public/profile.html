<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Assassin Game - Profile</title>
    </head>
    <body>
        <ul class="horizontal">
            <div class="left">
                <li><a href="index.html">Home</a></li>
                <li class="guest-only"><a href="login.html">Login</a></li>
                <li class="guest-only"><a href="register.html">Register</a></li>
                <li class="user-only"><a href="game.html">Active Game</a></li>
            </div>
            <div class="right">
                <li><a class="active" href="profile.html">Profile</a></li>
                <li><a href="about.html">About</a></li>
                <li class="user-only"><button class="nav-logout" onclick="logout()">Logout</button></li>
            </div>
        </ul>

        <div class="container">
            <h2>Your Profile</h2>
            <div id="profileDisplay">
                <img id="profilePic" src="" alt="Profile Picture" style="width: 100px; border-radius: 50%;" />
                <h3 id="profileUsername"></h3>
                <p>Games Played: <span id="gamesPlayed"></span></p>
                <p>Games Won: <span id="gamesWon"></span></p>
                <p>Kills: <span id="kills"></span></p>
            </div>

            <hr />

            <h3>Edit Profile</h3>
            <form id="editProfileForm">
                <input type="text" name="username" placeholder="New Username" />
                <input type="file" name="picture" accept="image/*" />
                <button type="submit">Update Profile</button>
            </form>
        </div>

        <script src="nav.js"></script>
        <script>
            async function loadProfile() {
                const res = await fetch('/profile-data');
                if (res.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                const data = await res.json();
                document.getElementById('profilePic').src = data.profile_picture_path;
                document.getElementById('profileUsername').innerText = data.username;
                document.getElementById('gamesPlayed').innerText = data.games_played;
                document.getElementById('gamesWon').innerText = data.games_won;
                document.getElementById('kills').innerText = data.kills;
            }

            document.getElementById('editProfileForm').onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const res = await fetch('/profile/edit', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    loadProfile();
                    alert("Profile updated!");
                } else {
                    alert(result.error);
                }
            };

            loadProfile();
        </script>
    </body>
</html>
