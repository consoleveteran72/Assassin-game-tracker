<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Assassin Game - Login</title>
    </head>
    <body>
        <ul class="horizontal">
            <div class="left">
                <li><a href="index.html">Home</a></li>
                <li class="guest-only"><a class="active" href="login.html">Login</a></li>
                <li class="guest-only"><a href="register.html">Register</a></li>
                <li class="user-only"><a href="game.html">Active Game</a></li>
            </div>
            <div class="right">
                <li><a href="profile.html">Profile</a></li>
                <li><a href="about.html">About</a></li>
                <li class="user-only"><button class="nav-logout" onclick="logout()">Logout</button></li>
            </div>
        </ul>

        <div class="container">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="text" name="username" placeholder="Username" required />
                <input type="password" name="password" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
            <p id="error" style="color: red;"></p>
        </div>

        <script src="nav.js"></script>
        <script>
            document.getElementById('loginForm').onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    window.location.href = '/index.html';
                } else {
                    document.getElementById('error').innerText = result.error;
                }
            };
        </script>
    </body>
</html>
